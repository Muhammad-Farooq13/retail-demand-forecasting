name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest-cov

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Generate synthetic dataset
        run: python -m src.data.generate_data --n-days 200 --n-stores 3 --n-items 5 --output data/raw/sales.csv

      - name: Run EDA
        run: python -m src.data.eda --input data/raw/sales.csv

      - name: Build features
        run: python -m src.features.build_features --input data/raw/sales.csv --output data/processed/features.parquet

      - name: Train model
        run: python -m src.models.train --features data/processed/features.parquet --test-days 30

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and train model (needed to bake into image)
        run: |
          pip install -r requirements.txt
          python -m src.data.generate_data --n-days 200 --n-stores 3 --n-items 5 --output data/raw/sales.csv
          python -m src.features.build_features --input data/raw/sales.csv --output data/processed/features.parquet
          python -m src.models.train --features data/processed/features.parquet --test-days 30

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: retail-demand-forecasting:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
