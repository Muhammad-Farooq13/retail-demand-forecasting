services:
  forecasting-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-demand-forecasting:latest
    container_name: retail-demand-forecasting
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  mlflow-ui:
    image: python:3.12-slim
    container_name: forecasting-mlflow-ui
    working_dir: /mlflow
    volumes:
      - ./mlruns.db:/mlflow/mlruns.db
    command: >
      sh -c "pip install --no-cache-dir mlflow==3.14.0 &&
             mlflow server --backend-store-uri sqlite:///mlruns.db --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    restart: unless-stopped
